name: Deploy Dicko Chauffage to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy static site to dicko-chauffage.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          cname: dicko-chauffage.com
          exclude_assets: '.github,src,node_modules,*.config.ts,*.config.js,package*.json,tsconfig*'
