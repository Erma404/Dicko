name: Deploy Dicko Chauffage to Namecheap via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build React app and deploy to dicko-chauffage.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy dist/ via FTP to Namecheap
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DICKO_FTP_SERVER }}
          username: ${{ secrets.DICKO_FTP_USERNAME }}
          password: ${{ secrets.DICKO_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
          log-level: verbose
